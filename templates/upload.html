<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>InfiniteCloud Upload</title>
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_submit.css')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/decor_upload.css') }}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/selection.css')}}">
    <link rel="stylesheet" href="../static/css/custom_scroll_bar_white.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}?v=3">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4E0S2QW6KC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4E0S2QW6KC');
</script>
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

</head>
<body>
<div class="dashboard-container">
        <aside class="sidebar">
        <div class="logo">InfiniteCloud</div>
        <nav>
            <a href="{{url_for('app.cloud')}}" class="nav-item">
                <i class="fa-solid fa-house"></i> Ana Sayfa
            </a>
            <a href="{{url_for('app.upload')}}" class="nav-item">
                <i class="fa-solid fa-cloud-arrow-up"></i> Yükle
            </a>
            <a href="{{url_for('app.files')}}" class="nav-item">
                <i class="fa-solid fa-globe"></i> Global Dosyalar
            </a>
            <a href="{{ url_for('app.myfiles') }}" class="nav-item active">
                <i class="fa-solid fa-file"></i> Benim Dosyalarım
            </a>
            <a href="{{url_for('app.logout_ic')}}" class="nav-item">
                <i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap
            </a>
            <hr class="sidebar-divider">
            <a href="{{url_for('app.projects')}}" class="nav-item">
                <i class="fa-brands fa-squarespace"></i> Projeler
            </a>
            <a href="{{url_for('app.reset_login')}}" class="nav-item admin">
                <i class="fa-solid fa-user-shield"></i> Admin
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="center-wrapper">
            <div class="upload-box">
                <img src="../static/img/upload_mor.png" alt="upload" class="upload-icon">
                <h2 class="box-title">Dosya Yükle</h2>

                <form method="post" enctype="multipart/form-data" id="uploadForm">
                    <div class="password-wrapper">
                        <input type="password" id="passwordInput" name="password" placeholder="Şifre" required>
                        <span id="togglePassword" class="toggle-password">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>

<div class="drop-area" id="upload-box">
    <input type="file" name="file" id="file" hidden required>

    <div class="upload-content">
        <div class="upload-icon">☁️</div>
        <p><strong>Dosyanı buraya bırak</strong></p>
        <p>veya</p>
        <button type="button" id="select-btn">📁 Dosya Seç</button>
        <span id="file-name">Henüz dosya seçilmedi</span>
    </div>
</div>
                    <div class="checkbox-group">

                        <label class="custom-checkbox">
                            <input type="checkbox" name="is_global">
                            <span>🌍 Küresel olsun</span>
                        </label>

                        {% if can_delete %}
                        <label class="custom-checkbox">
                            <input type="checkbox" name="high_lighted">
                            <span>⭐ Admin özel çerçeve</span>
                        </label>
                        {% endif %}

                    </div>

                    <div class="button-container">
                        <a href="#" class="submit">YÜKLE</a>
                        <div class="tick-circle">
                            <svg viewBox="0 0 24 24">
                                <path d="M20.285 6.709a1 1 0 0 0-1.414-1.418l-9.193 9.203-4.193-4.2a1 1 0 0 0-1.414 1.414l4.9 4.9a1 1 0 0 0 1.414 0l9.91-9.9z"/>
                            </svg>
                        </div>
                    </div>
                </form>
                <p class="msg" id="msg">{{ msg }}</p>
            </div>
        </div>
        
        <footer class="footer-text">
            <div>
                © <span id="year"></span> 
                <a href="#" class="footer-link">Infinitesoft-tr</a>. 
                Tüm hakları saklıdır.
            </div>
            <div class="footer-sub-links">
                <a href="#" class="footer-link">Gizlilik Politikası</a> • 
                <a href="#" class="footer-link">Kullanım Şartları</a> • 
                <a href="#" class="footer-link">Destek</a>
            </div>
        </footer>
    </main>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    /* ===== UPLOAD + TIK ===== */
    const submitBtn = document.querySelector(".button-container .submit");
    const tickCircle = document.querySelector(".tick-circle");
    const form = document.getElementById("uploadForm");
    const msg = document.getElementById("msg");

    submitBtn.addEventListener("click", async function (e) {
        e.preventDefault();

        submitBtn.style.transform = "scale(0.3)";
        submitBtn.style.opacity = "0";

        const formData = new FormData(form);

        try {
            const response = await fetch("/infinitecloud/upload", {
                method: "POST",
                body: formData
            });

            const result = await response.json();

            msg.textContent = result.message;
            msg.style.color = result.success ? "lightgreen" : "red";

            if (result.success) {
                tickCircle.style.width = "50px";
                tickCircle.style.height = "50px";
                tickCircle.style.transform = "translate(-50%, -50%) scale(1)";
            } else {
                submitBtn.style.transform = "scale(1)";
                submitBtn.style.opacity = "1";
            }

        } catch (err) {
            msg.textContent = "❌ Sunucu hatası";
            msg.style.color = "red";
            submitBtn.style.transform = "scale(1)";
            submitBtn.style.opacity = "1";
            console.error(err);
        }
    });

    /* ===== ŞİFRE GÖSTER / GİZLE ===== */
    const passwordInput = document.getElementById("passwordInput");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", function () {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";

        this.innerHTML = isPassword
            ? '<i class="fa-solid fa-eye-slash"></i>'
            : '<i class="fa-solid fa-eye"></i>';
    });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const uploadBox = document.getElementById("upload-box");
    const fileInput = document.getElementById("file");
    const selectBtn = document.getElementById("select-btn");
    const fileName = document.getElementById("file-name");

    selectBtn.addEventListener("click", () => {
        fileInput.click();
    });

    fileInput.addEventListener("change", () => {
        if (fileInput.files.length > 0) {
            fileName.textContent = fileInput.files[0].name;
        }
    });

    uploadBox.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadBox.classList.add("dragover");
    });

    uploadBox.addEventListener("dragleave", () => {
        uploadBox.classList.remove("dragover");
    });

uploadBox.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadBox.classList.remove("dragover");

    const files = e.dataTransfer.files;

    if (files.length > 0) {
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(files[0]);
        fileInput.files = dataTransfer.files;

        fileName.textContent = files[0].name;
    }
});

});
</script>
</body>
</html>
