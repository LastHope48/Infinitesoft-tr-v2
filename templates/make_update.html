<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

<body>

<div class="admin-box">
    <h2>🚀 Yeni Güncelleme Paylaş</h2>

    <form method="POST">
        <label>Versiyon</label>
        <input type="text" name="version" placeholder="v1.2.0" required>

        <label>Güncellenen / Düzeltilenler</label>
        <textarea name="content" rows="8" placeholder="- Hata düzeltildi&#10;- Performans artırıldı" required></textarea>

        <button type="submit">Paylaş</button>
    </form>
</div>
