<!DOCTYPE html>
<html lang="tr">
<head>
    <title>InfiniteCloud</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{url_for('static',filename='css/main_layout_infinitecloud.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_home_cloud.css', _external=True)}}">
    <link rel="icon" href="{{ url_for('static', filename='favicon_infinitecloud.ico', _external=True) }}?v=3">
    <link rel="stylesheet" href="{{url_for('static',filename='css/selection.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/custom_scroll_bar_white.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_login_ic.css', _external=True)}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4E0S2QW6KC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4E0S2QW6KC');
</script>
<style>
.terms {
    display: flex;
    flex-direction: row;
}
</style>
</head>
<body>
<div class="dashboard-container">

    <div class="sidebar">
        <a href="{{url_for('infinitecloud.cloud')}}" class="logo">InfiniteCloud</a>

        <a href="{{url_for('app.projects',_external=True)}}" class="nav-item">
            <i class="fa-brands fa-squarespace"></i> Projeler
        </a>

        <a href="{{url_for('infinitecloud.login_ic')}}" class="nav-item">
            <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
        </a>
    </div>

    <div class="main-content">
        <div class="center-wrapper">
            <div class="auth-card">
                <h2>Hesap Oluştur</h2>

                <form method="POST" id="registerForm">
                    <input type="text" name="username" placeholder="Kullanıcı Adı" required>

                    <!-- Email inputu buraya ekliyoruz -->
                    <!-- Tek bir email input + doğrula butonu -->
<input type="email" name="email" placeholder="E-posta" id="emailInput" required>
<button type="button" id="verifyBtn">Doğrula</button>
<span id="checkIcon" style="display:none; color:green;">✔</span>

<!-- Kod modal aynı -->
<div id="codeModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div style="background:#fff; padding:30px; border-radius:8px; text-align:center;">
        <h3>E-Postana gelen 6 haneli kodu gir</h3>
        <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
            <input class="codeInput" maxlength="1" style="width:40px; font-size:24px; text-align:center;">
            <input class="codeInput" maxlength="1" style="width:40px; font-size:24px; text-align:center;">
            <input class="codeInput" maxlength="1" style="width:40px; font-size:24px; text-align:center;">
            <input class="codeInput" maxlength="1" style="width:40px; font-size:24px; text-align:center;">
            <input class="codeInput" maxlength="1" style="width:40px; font-size:24px; text-align:center;">
            <input class="codeInput" maxlength="1" style="width:40px; font-size:24px; text-align:center;">
        </div>
        <button id="verifyCodeBtn" style="padding:8px 20px;">Doğrula</button>
        <div id="codeError" style="color:red; margin-top:10px; display:none;"></div>
    </div>
</div>

<input type="password" name="password" placeholder="Şifre" required>

<div class="terms">
    <label for="terms">
        <a href="{{url_for('app.privacy')}}" target="_blank">Gizlilik Sözleşmesi</a> ve 
        <a href="{{url_for('app.terms')}}" target="_blank">Kullanım Şartları</a>'nı okudum ve kabul ediyorum
    </label>
    <input type="checkbox" name="terms" id="terms" required>
</div>

<button type="submit" disabled id="submitBtn" style="opacity:0.5; cursor:not-allowed;">Hesap Oluştur</button>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const verifyBtn = document.getElementById("verifyBtn");
    const emailInput = document.getElementById("emailInput");
    const codeModal = document.getElementById("codeModal");
    const verifyCodeBtn = document.getElementById("verifyCodeBtn");
    const codeInputs = document.querySelectorAll(".codeInput");
    const codeError = document.getElementById("codeError");
    const submitBtn = document.getElementById("submitBtn");
    const checkIcon = document.getElementById("checkIcon");
    const termsCheckbox = document.getElementById("terms");

    // Butonu aktif etme fonksiyonu
    function updateSubmitBtn() {
        const canSubmit = checkIcon.style.display === "inline" && termsCheckbox.checked;
        submitBtn.disabled = !canSubmit;
        submitBtn.style.opacity = canSubmit ? 1 : 0.5;
        submitBtn.style.cursor = canSubmit ? "pointer" : "not-allowed";
    }

    // Checkbox değiştiğinde butonu kontrol et
    termsCheckbox.addEventListener("change", updateSubmitBtn);

    // E-posta doğrulama
    verifyBtn.addEventListener("click", async () => {
        const email = emailInput.value;
        if (!email) return alert("Lütfen e-posta girin!");

        await fetch("/send-code", {
            method: "POST",
            body: new URLSearchParams({ email })
        });

        codeModal.style.display = "flex";
        codeInputs[0].focus();
    });

    // Kod input otomatik geçiş
    codeInputs.forEach((input, i) => {
        input.addEventListener("input", () => {
            if (input.value.length === 1 && i < codeInputs.length - 1) {
                codeInputs[i + 1].focus();
            }
        });
    });

    // Kod doğrulama
    verifyCodeBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        const code = Array.from(codeInputs).map(i => i.value).join("");
        const email = emailInput.value;

        const res = await fetch("/verify-code", {
            method: "POST",
            body: new URLSearchParams({ email, code })
        });

        const data = await res.json();

        if (data.success) {
            codeModal.style.display = "none";
            checkIcon.style.display = "inline";
            updateSubmitBtn(); // ✅ burada submit kontrol
        } else {
            codeError.style.display = "block";
            codeError.textContent = "Kod yanlış!";
        }
    });
});
</script>
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch("/register", {
        method: "POST",
        body: formData
    });
    const data = await res.json();
    if(data.success){
        window.location = data.redirect; // ← burada yönlendiriyoruz
    } else {
        alert(data.message);
    }
});
</script>
</body>
</html>
