<!DOCTYPE html>
<html lang="tr">
<head>
    <title>InfiniteCloud</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{url_for('static',filename='css/main_layout_infinitecloud.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_home_cloud.css', _external=True)}}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico', _external=True) }}?v=3">
    <link rel="stylesheet" href="{{url_for('static',filename='css/selection.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/custom_scroll_bar_white.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_login_ic.css', _external=True)}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4E0S2QW6KC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4E0S2QW6KC');
</script>
<style>
.terms {
    display: flex;
    flex-direction: row;
}
</style>
</head>
<body>
<div class="dashboard-container">

    <div class="sidebar">
        <a href="{{url_for('infinitecloud.cloud')}}" class="logo">InfiniteCloud</a>

        <a href="{{url_for('app.projects',_external=True)}}" class="nav-item">
            <i class="fa-brands fa-squarespace"></i> Projeler
        </a>

        <a href="{{url_for('infinitecloud.login_ic')}}" class="nav-item">
            <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
        </a>
    </div>

    <div class="main-content">
        <div class="center-wrapper">

            <div class="auth-card">
                <h2>Hesap Oluştur</h2>

                <form method="POST" id="registerForm">
                    <input type="text" name="username" placeholder="Kullanıcı Adı" required>
                    <input type="email" name="email" placeholder="E-posta" id="email">
                    <input type="password" name="password" placeholder="Şifre" required>
                    <div class="terms">
                    <label for="terms">
                        <a href="{{url_for('app.privacy')}}" target="_blank">Gizlilik Sözleşmesi</a>ni ve <a href="{{url_for('app.terms')}}" target="_blank">Kullanım Şartları</a>nı okudum ve kabul ediyorum
                    </label>
                    <input type="checkbox" name="terms" id="terms" required>
                    </div>
                    <button type="submit" disabled id="submitBtn" style="opacity: 0.5; cursor: not-allowed;">Hesap Oluştur</button>
                </form>

                <p class="auth-switch">
                    Zaten hesabın var mı?
                    <a href="{{url_for('infinitecloud.login_ic')}}">Giriş Yap</a>
                </p>
            </div>

        </div>
    </div>
</div>
<footer class="footer-text">
    © <span id="year"></span> infinitesoft-tr • Tüm hakları saklıdır.
    <div class="footer-links">
        <a href="{{ url_for('app.privacy', _external=True) }}">Gizlilik Politikası</a> • 
        <a href="{{ url_for('app.terms', _external=True) }}">Kullanım Şartları</a> • 
        <a href="#">Destek</a>
    </div>
</footer>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
<script>
  const form = document.getElementById('registerForm');
  const btn = document.getElementById('submitBtn');
  const inputs = form.querySelectorAll('input[type=text], input[type=email], input[type=password]');
  const checkbox = document.getElementById('terms');

  function checkForm() {
    let allFilled = true;
    inputs.forEach(input => {
      if (!input.value.trim()) allFilled = false;
    });
    if (!checkbox.checked) allFilled = false;

    if (allFilled) {
      btn.disabled = false;
      btn.style.opacity = 1;
      btn.style.cursor = 'pointer';
    } else {
      btn.disabled = true;
      btn.style.opacity = 0.5;
      btn.style.cursor = 'not-allowed';
    }
  }

  inputs.forEach(input => input.addEventListener('input', checkForm));
  checkbox.addEventListener('change', checkForm);
</script>
</body>
</html>
