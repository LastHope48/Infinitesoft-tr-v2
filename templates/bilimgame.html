<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMAN YOLCULUĞU BİLİMİ KURTAR</title>
<link rel="stylesheet" href="{{url_for('static',filename='css/selection.css')}}">
<link rel="stylesheet" href="{{url_for('static',filename='css/custom_scroll_bar_black.css')}}">
<link rel="icon" href="{{url_for('static',filename='favicon.ico')}}">
<link rel="stylesheet" href="{{url_for('static',filename='css/font_awesome.css')}}">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #1e1e2f, #111);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #startScreen, #gameScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #gameScreen {
        display: none;
        background: black;
    }

    button {
        padding: 20px 50px;
        font-size: 24px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: gold;
        color: black;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        background: orange;
    }

    #pyramid {
        max-width: 80%;
        max-height: 80%;
    }
    .top-left-btn {
    position: fixed;
    top: 20px;
    left: 20px;

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 10px 18px;
    background: #1a1a1a;
    color: #ddd;

    border-radius: 12px;
    cursor: pointer;

    font-size: 16px;
    transition: all 0.25s ease;
    z-index: 9999;
    text-decoration: none;
}

.top-left-btn i {
    font-size: 18px;
}

.top-left-btn:hover {
    background: #2a2a2a;
    color: white;
    transform: translateY(-2px);
}
</style>
</head>

<body>
<a href="{{url_for('app.projects',_external=True)}}" class="top-left-btn">
    <i class="fa-brands fa-squarespace"></i>
    <span>Projeler</span>
</a>
<div id="startScreen">
    <button onclick="startGame()">Başla</button>
</div>

<div id="gameScreen">
    <img id="pyramid" src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Kheops-Pyramid.jpg">
</div>

<script>
function startGame() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
}
</script>

</body>
</html>
