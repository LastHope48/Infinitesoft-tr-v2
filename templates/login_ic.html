<!DOCTYPE html>
<html lang="tr">
<head>
    <title>InfiniteCloud</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{url_for('static',filename='css/main_layout_infinitecloud.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_home_cloud.css', _external=True)}}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico', _external=True) }}?v=3">
    <link rel="stylesheet" href="{{url_for('static',filename='css/selection.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/custom_scroll_bar_white.css', _external=True)}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/decor_login_ic.css', _external=True)}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4E0S2QW6KC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4E0S2QW6KC');
</script>
</head>
<body>
 <div class="dashboard-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="{{url_for('infinitecloud.cloud')}}" class="logo">InfiniteCloud</a>

        <a href="/" class="nav-item">
            <i class="fa-brands fa-squarespace"></i> Projeler
        </a>

        <a href="{{url_for('infinitecloud.register_ic')}}" class="nav-item">
            <i class="fa-solid fa-user-plus"></i> Hesap Oluştur
        </a>
    </div>

    <!-- Main -->
    <div class="main-content">
        <div class="center-wrapper">

            <div class="auth-card">
                <h2>Giriş Yap</h2>

                <form id="loginForm" method="POST">
                    <input type="text" name="username" placeholder="Kullanıcı Adı" required>
                    <input type="email" name="email" placeholder="E-posta" id="emailInput" required>
                    <input type="password" name="password" placeholder="Şifre" required>
                    <button type="submit">Giriş Yap</button>
                </form>
                <form id="codeForm" style="display:none;">
                    <input name="code" id="codeInput" placeholder="6 haneli kod">
                    <button type="submit">Doğrula</button>
                </form>
                <!-- Hata mesajı buraya gelecek -->
                <div id="loginError" style="color:red; margin-top:10px; display:none;"></div>

                <p class="auth-switch">
                    Hesabın yok mu?
                    <a href="{{url_for('infinitecloud.register_ic')}}">Hesap Oluştur</a>
                </p>
            </div>

        </div>
    </div>
</div>
<footer class="footer-text">
    © <span id="year"></span> infinitesoft-tr • Tüm hakları saklıdır.
    <div class="footer-links">
        <a href="{{ url_for('app.privacy', _external=True) }}">Gizlilik Politikası</a> • 
        <a href="{{ url_for('app.terms', _external=True) }}">Kullanım Şartları</a> • 
        <a href="#">Destek</a>
    </div>
</footer>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
<script>
const form = document.getElementById("loginForm");
const codeForm = document.getElementById("codeForm");
const errorDiv = document.getElementById("loginError");

// Login form submit
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    const response = await fetch("{{ url_for('infinitecloud.login_ic') }}", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    // 🔥 2FA kontrolü
    if (data.step === "2fa") {
        form.style.display = "none";
        codeForm.style.display = "block";
        return;
    }

    if (data.success) {
        window.location.href = data.redirect;
    } else {
        errorDiv.style.display = "block";
        errorDiv.textContent = data.message;
    }
});

// 2FA form submit
codeForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const code = codeForm.querySelector("input[name='code']").value;

    const response = await fetch("{{ url_for('infinitecloud.verify_login') }}", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: new URLSearchParams({code})
    });

    const data = await response.json();

    if(data.success){
        window.location.href = data.redirect;  // cloud sayfasına yönlendir
    } else {
        alert("Kod yanlış veya süresi dolmuş");
    }
});
</script>
</body>
</html>
